name: Setup JDK
description: Setup JDK

inputs:
  java-version:
    description: The java jdk version to setup
    default: ''
    required: true
  gpg-secret-key:
    description: The gpg secret key
    default: ''
    required: true

runs:
  using: composite
  steps:
    - name: Check if java-version variable is Set
      if: inputs.java-version == ''
      shell: bash
      run: |
        echo "The variable 'java-version' was not set"  
        exit 1

    - name: Check if gpg-secret-key variable is Set
      if: inputs.gpg-secret-key == ''
      shell: bash
      run: |
        echo "The variable 'gpg-secret-key' was not set"  
        exit 1

    - name: Check gpg setup on Windows
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        gpg --version
        del /c/Users/runneradmin/.gnupg/common.conf

    - uses: actions/setup-java@v4
      if: env.JAVA_IS_SETUP != 'true'
      with:
        java-version:    ${{ inputs.java-version }}
        distribution:    "temurin"
        server-id:       ossrh
        server-username: MAVEN_CENTRAL_USERNAME
        server-password: MAVEN_CENTRAL_PASSWORD
        gpg-private-key: ${{ inputs.gpg-secret-key }}
        gpg-passphrase:  MAVEN_GPG_PASSPHRASE
        cache:           maven

    - name: Check gpg setup on Windows
      if: runner.os == 'Windows'
      shell: bash
      run: |
        gpg --version
        gpg --list-keys
        gpg --list-secret-keys
        ls -lah /c/Users/runneradmin/.gnupg
        ls -lah /c/Users/runneradmin/.m2
        cat     /c/Users/runneradmin/.m2/toolchains.xml
        cat     /c/Users/runneradmin/.m2/settings.xml

    - name: Check gpg setup on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        gpg --version
        gpg --list-keys
        gpg --list-secret-keys
        ls -lah /home/runner/.gnupg
        ls -lah /home/runner/.m2
        cat     /home/runner/.m2/toolchains.xml
        cat     /home/runner/.m2/settings.xml

    - id: set_JAVA_IS_SETUP_var
      shell: bash
      run: |
        echo "JAVA_IS_SETUP=true" >> $GITHUB_ENV
